<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-page);padding:20px;font-family:var(--font-body);box-sizing:border-box;}
.row{display:flex;gap:12px;}
.sw{flex:1;height:80px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;font:var(--text-caption);border:1px solid var(--border-subtle);}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--black-1);color:var(--white-1)">black-1</div>
  <div class="sw" style="background:var(--black-2);color:var(--white-1)">black-2</div>
  <div class="sw" style="background:var(--black-3);color:var(--white-1)">black-3</div>
  <div class="sw" style="background:var(--black-4);color:var(--white-1)">black-4</div>
  <div class="sw" style="background:var(--white-1);color:var(--black-1)">white-1</div>
  <div class="sw" style="background:var(--white-2);color:var(--black-1)">white-2</div>
  <div class="sw" style="background:var(--white-3);color:var(--black-1)">white-3</div>
</div>
</body></html>
