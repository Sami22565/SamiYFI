<!-- @dsCard group="Brand" viewport="700x220" name="Motion" subtitle="Ambient sun glow (ember) + button hover/press" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-page);padding:24px;box-sizing:border-box;display:flex;align-items:center;gap:28px;overflow:hidden;position:relative;}
.sun-wrap{position:relative;width:120px;height:120px;flex:none;display:flex;align-items:center;justify-content:center;}
.sun-rays{
  position:absolute;inset:-30px;border-radius:50%;
  background:conic-gradient(from 0deg,
    rgba(255,75,43,0) 0deg, rgba(255,75,43,0.35) 20deg, rgba(255,75,43,0) 40deg,
    rgba(212,175,106,0) 90deg, rgba(212,175,106,0.30) 110deg, rgba(212,175,106,0) 130deg,
    rgba(255,75,43,0) 180deg, rgba(255,75,43,0.35) 200deg, rgba(255,75,43,0) 220deg,
    rgba(212,175,106,0) 270deg, rgba(212,175,106,0.30) 290deg, rgba(212,175,106,0) 310deg,
    rgba(255,75,43,0) 360deg);
  animation: sy-spin 8s linear infinite;
}
.sun-core{
  position:relative;width:64px;height:64px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--ember-300), var(--ember-500) 55%, var(--ember-600) 100%);
  box-shadow:var(--shadow-glow-ember);
  animation: sy-pulse 2.4s var(--ease-standard) infinite;
  overflow:hidden;
}
.sun-core::after{
  content:'';
  position:absolute;inset:-40%;
  background:conic-gradient(from 0deg,
    transparent 0%, transparent 40%, rgba(255,255,255,0.85) 48%, rgba(255,255,255,0.95) 50%,
    rgba(255,255,255,0.85) 52%, transparent 60%, transparent 100%);
  animation: sy-shine 3s linear infinite;
  mix-blend-mode: overlay;
}
@keyframes sy-shine { to { transform: rotate(360deg); } }
@keyframes sy-spin { to { transform: rotate(360deg); } }
@keyframes sy-pulse {
  0%, 100% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.08); filter: brightness(1.15); }
}
@media (prefers-reduced-motion: reduce) {
  .sun-rays, .sun-core, .sun-core::after { animation: none; }
}
.copy{font:var(--text-body-sm);color:var(--text-muted);max-width:340px;}
.copy b{color:var(--text-primary);}
</style></head>
<body>
<div class="sun-wrap">
  <div class="sun-rays"></div>
  <div class="sun-core"></div>
</div>
<div class="copy">
  <b>Ambient glow:</b> slow pulse (2.4s, standard ease) + a faint rotating ray sweep (8s linear) —
  used behind hero art / premium moments, never on interactive controls.
  <br/><br/>
  <b>Interaction motion</b> stays fast: 120–200ms, <code>cubic-bezier(0.2,0.6,0.2,1)</code>, press scales to 0.97, no bounce.
</div>
</body></html>
