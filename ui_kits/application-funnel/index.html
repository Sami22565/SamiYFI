<script type="text/babel">
const { Nav, Button, Badge, Card, StatBlock, TestimonialCard, Accordion } =
  window.SamiYafeaiDesignSystem_6c8c35;

function App() {
React.useEffect(() => {
  if (window.lucide) window.lucide.createIcons();
  const onMove = (e) => {
    const btn = e.target.closest && e.target.closest('.sy-btn--lg.sy-btn--primary, .sy-btn--lg.sy-btn--outline');
    if (!btn) return;
    const r = btn.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width - 0.5) * 10;
    const y = ((e.clientY - r.top) / r.height - 0.5) * 10;
    btn.style.transform = `translate(${x}px, ${y}px)`;
  };
  const onLeave = (e) => {
    const btn = e.target.closest && e.target.closest('.sy-btn--lg');
    if (btn) btn.style.transform = '';
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseout', onLeave);
  return () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseout', onLeave); };
}, []);
  const onApply = () => window.open('https://form.typeform.com/to/Wadzu0Jp', '_blank');
  return (
    <div>
      <div className="sy-grain"></div>
      <ScrollProgress />
      <StickyNav onApply={onApply} />
      <HeroSection Nav={Nav} Button={Button} Badge={Badge} onApply={onApply} />
      <StatsSection StatBlock={StatBlock} />
      <MeetCoachSection Badge={Badge} />
      <OfferSection Badge={Badge} Card={Card} />
      <LearnVsSection Badge={Badge} />
      <HowItWorksSection Badge={Badge} />
      <ComparisonSection Badge={Badge} />
      <TestimonialsSection Badge={Badge} TestimonialCard={TestimonialCard} />
      <FAQSection Badge={Badge} Accordion={Accordion} />
      <Footer />
      <BackToTop />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
