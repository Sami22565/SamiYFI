<!-- @dsCard group="Spacing" viewport="700x220" name="Spacing Scale" subtitle="4px base scale, --space-1 through --space-10" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-page);padding:20px;box-sizing:border-box;display:flex;flex-direction:column;gap:8px;}
.row{display:flex;align-items:center;gap:12px;}
.bar{background:var(--accent-primary);height:14px;border-radius:3px;}
.lbl{font:var(--text-caption);color:var(--text-muted);width:90px;}
</style></head>
<body>
<div class="row"><span class="lbl">space-1 4px</span><div class="bar" style="width:4px"></div></div>
<div class="row"><span class="lbl">space-2 8px</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="lbl">space-3 12px</span><div class="bar" style="width:12px"></div></div>
<div class="row"><span class="lbl">space-4 16px</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="lbl">space-5 24px</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="lbl">space-6 32px</span><div class="bar" style="width:32px"></div></div>
<div class="row"><span class="lbl">space-7 48px</span><div class="bar" style="width:48px"></div></div>
<div class="row"><span class="lbl">space-8 64px</span><div class="bar" style="width:64px"></div></div>
</body></html>
