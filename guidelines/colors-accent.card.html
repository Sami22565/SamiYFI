<!-- @dsCard group="Colors" viewport="700x160" name="Accent Palette" subtitle="Ember (primary) & Gold (secondary)" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-page);padding:20px;font-family:var(--font-body);box-sizing:border-box;}
.row{display:flex;gap:12px;}
.sw{flex:1;height:80px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;font:var(--text-caption);color:var(--text-primary);}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--ember-500)">ember-500</div>
  <div class="sw" style="background:var(--ember-600)">ember-600</div>
  <div class="sw" style="background:var(--ember-300);color:#1a1a1a">ember-300</div>
  <div class="sw" style="background:var(--ember-100);color:#1a1a1a">ember-100</div>
  <div class="sw" style="background:var(--gold-500);color:#1a1a1a">gold-500</div>
  <div class="sw" style="background:var(--gold-600);color:#1a1a1a">gold-600</div>
  <div class="sw" style="background:var(--gold-100);color:#1a1a1a">gold-100</div>
</div>
</body></html>
