<!-- @dsCard group="Brand" viewport="700x160" name="Corner Radii" subtitle="Sharp panels, pill CTAs/badges" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-page);padding:20px;box-sizing:border-box;display:flex;gap:16px;align-items:center;}
.box{background:var(--bg-card);border:1px solid var(--border-subtle);width:90px;height:90px;display:flex;align-items:center;justify-content:center;font:var(--text-caption);color:var(--text-muted);}
</style></head>
<body>
<div class="box" style="border-radius:var(--radius-sm)">sm 6px</div>
<div class="box" style="border-radius:var(--radius-md)">md 10px</div>
<div class="box" style="border-radius:var(--radius-lg)">lg 16px</div>
<div class="box" style="border-radius:var(--radius-pill);width:120px">pill</div>
</body></html>
