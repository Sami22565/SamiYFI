<!-- @dsCard group="Colors" viewport="700x180" name="Semantic Aliases" subtitle="bg / text / border tokens in context" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-page);padding:20px;font-family:var(--font-body);box-sizing:border-box;}
.card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:20px;display:flex;flex-direction:column;gap:8px;max-width:340px;}
.p{color:var(--text-primary);font:var(--text-body-md);}
.s{color:var(--text-secondary);font:var(--text-body-sm);}
.m{color:var(--text-muted);font:var(--text-caption);}
.link{color:var(--link)}
</style></head>
<body>
<div class="card">
  <div class="p">text-primary — headline &amp; body copy</div>
  <div class="s">text-secondary — supporting copy</div>
  <div class="m">TEXT-MUTED — CAPTIONS / LABELS</div>
  <a class="link" href="#">link color example</a>
</div>
</body></html>
