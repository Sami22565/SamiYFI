<!-- @dsCard group="Brand" viewport="700x180" name="Shadows & Glow" subtitle="Elevation + ember CTA glow" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-page);padding:24px;box-sizing:border-box;display:flex;gap:24px;align-items:center;}
.box{background:var(--bg-card);width:100px;height:70px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font:var(--text-caption);color:var(--text-muted);}
</style></head>
<body>
<div class="box" style="box-shadow:var(--shadow-sm)">shadow-sm</div>
<div class="box" style="box-shadow:var(--shadow-md)">shadow-md</div>
<div class="box" style="box-shadow:var(--shadow-lg)">shadow-lg</div>
<div class="box" style="box-shadow:var(--shadow-glow-ember);background:var(--accent-primary);color:var(--text-on-accent)">glow-ember</div>
</body></html>
