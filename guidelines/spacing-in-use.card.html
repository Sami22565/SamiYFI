<!-- @dsCard group="Spacing" viewport="700x220" name="Spacing In Use" subtitle="Card padding & gap example" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-page);padding:20px;box-sizing:border-box;}
.card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:var(--space-5);display:flex;flex-direction:column;gap:var(--space-3);max-width:300px;}
.card h4{margin:0;font:var(--text-display-md);color:var(--accent-primary);text-transform:uppercase;}
.card p{margin:0;font:var(--text-body-sm);color:var(--text-secondary);}
</style></head>
<body>
<div class="card">
  <h4>500+</h4>
  <p>Padding = --space-5 (24px). Internal gap = --space-3 (12px).</p>
</div>
</body></html>
